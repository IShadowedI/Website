name: Update News Feeds

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install rss-parser

      - name: Fetch latest news
        run: node scripts/fetch-news.js

      - name: Commit and push changes
        run: |
          git config user.name "Dragon's Den Bot"
          git config user.email "bot@dragonsshadow.com"
          git add -A
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "Auto-update news feeds [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
